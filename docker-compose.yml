services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youapp-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: ${PORT:-3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/test-youapp-be}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads

  mongodb:
    image: docker.io/library/mongo:7
    container_name: youapp-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongodb-data:
  uploads-data:
